<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="45%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#161622"/>
      <stop offset="100%" stop-color="#080810"/>
    </radialGradient>

    <radialGradient id="sphere" cx="36%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#a8d0ff"/>
      <stop offset="25%" stop-color="#6aaeff"/>
      <stop offset="55%" stop-color="#4f8ef7"/>
      <stop offset="80%" stop-color="#1e48c0"/>
      <stop offset="100%" stop-color="#0a1f5c"/>
    </radialGradient>

    <radialGradient id="atmosphereGrad" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#4f8ef7" stop-opacity="0"/>
      <stop offset="100%" stop-color="#4f8ef7" stop-opacity="0.35"/>
    </radialGradient>

    <filter id="bigGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="35"/>
    </filter>

    <filter id="ringGlow" x="-40%" y="-200%" width="180%" height="500%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>

    <linearGradient id="ringGradFront" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#4f8ef7" stop-opacity="0.05"/>
      <stop offset="20%"  stop-color="#4f8ef7" stop-opacity="0.9"/>
      <stop offset="50%"  stop-color="#8ec5ff" stop-opacity="1"/>
      <stop offset="80%"  stop-color="#4f8ef7" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#4f8ef7" stop-opacity="0.05"/>
    </linearGradient>

    <linearGradient id="ringGradBack" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#4f8ef7" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#4f8ef7" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#4f8ef7" stop-opacity="0"/>
    </linearGradient>

    <clipPath id="topHalf">
      <rect x="0" y="0" width="1024" height="512"/>
    </clipPath>
    <clipPath id="bottomHalf">
      <rect x="0" y="512" width="1024" height="512"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Subtle star field — sparse dots -->
  <circle cx="180" cy="150" r="2" fill="white" opacity="0.25"/>
  <circle cx="820" cy="200" r="1.5" fill="white" opacity="0.2"/>
  <circle cx="120" cy="700" r="1.5" fill="white" opacity="0.18"/>
  <circle cx="880" cy="780" r="2" fill="white" opacity="0.22"/>
  <circle cx="720" cy="120" r="1" fill="white" opacity="0.15"/>
  <circle cx="300" cy="870" r="1.5" fill="white" opacity="0.18"/>
  <circle cx="950" cy="450" r="1" fill="white" opacity="0.12"/>
  <circle cx="70"  cy="420" r="1.5" fill="white" opacity="0.15"/>
  <circle cx="600" cy="90"  r="1" fill="white" opacity="0.12"/>
  <circle cx="800" cy="900" r="1.5" fill="white" opacity="0.2"/>

  <!-- Ambient sphere glow (deep blue halo behind planet) -->
  <circle cx="512" cy="512" r="240" fill="#2558d4" filter="url(#bigGlow)" opacity="0.55"/>

  <!-- Ring BACK half — dimmer, behind sphere -->
  <!-- Glow for back ring -->
  <ellipse cx="512" cy="512" rx="385" ry="98"
           stroke="#4f8ef7" stroke-width="30" fill="none"
           clip-path="url(#topHalf)" filter="url(#ringGlow)" opacity="0.12"/>
  <!-- Back ring stroke -->
  <ellipse cx="512" cy="512" rx="385" ry="98"
           stroke="url(#ringGradBack)" stroke-width="18" fill="none"
           clip-path="url(#topHalf)"/>

  <!-- Planet sphere -->
  <circle cx="512" cy="512" r="185" fill="url(#sphere)"/>

  <!-- Planet atmosphere ring (rim light) -->
  <circle cx="512" cy="512" r="185" fill="url(#atmosphereGrad)"/>

  <!-- Planet specular highlight — soft oval in upper-left -->
  <ellipse cx="455" cy="440" rx="65" ry="42"
           fill="white" opacity="0.13"
           transform="rotate(-35, 455, 440)"/>
  <!-- Smaller bright spot -->
  <ellipse cx="438" cy="422" rx="28" ry="18"
           fill="white" opacity="0.18"
           transform="rotate(-35, 438, 422)"/>

  <!-- Ring FRONT half — bright, in front of sphere -->
  <!-- Glow for front ring -->
  <ellipse cx="512" cy="512" rx="385" ry="98"
           stroke="#4f8ef7" stroke-width="30" fill="none"
           clip-path="url(#bottomHalf)" filter="url(#ringGlow)" opacity="0.5"/>
  <!-- Front ring stroke -->
  <ellipse cx="512" cy="512" rx="385" ry="98"
           stroke="url(#ringGradFront)" stroke-width="18" fill="none"
           clip-path="url(#bottomHalf)"/>

  <!-- Small satellite dot on ring (front, right side) -->
  <circle cx="890" cy="537" r="16" fill="#8ec5ff" opacity="0.95"/>
  <circle cx="890" cy="537" r="28" fill="#4f8ef7" filter="url(#ringGlow)" opacity="0.6"/>
</svg>
